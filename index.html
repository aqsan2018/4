<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Match</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pacifico', cursive;
            background-color: #fce7f3; /* Light pink background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            perspective: 1000px;
        }

        /* --- Main Content (Hidden by default) --- */
        #main-content {
            visibility: hidden; /* Start hidden */
            opacity: 0; /* Start faded out */
            transition: opacity 0.5s ease-in; /* Add fade-in */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-content.visible { /* Class to show content */
             visibility: visible;
             opacity: 1;
        }

        /* Original Game Styles */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        @media (min-width: 640px) {
            #game-board {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .card {
            width: 80px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s, opacity 1s, transform 1s;
            cursor: pointer;
            border-radius: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            /* CSS variables to store original position */
            --card-left: 0;
            --card-top: 0;
        }
         @media (min-width: 640px) {
            .card {
                width: 100px;
                height: 150px;
            }
        }


        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card.is-matched {
            pointer-events: none;
            box-shadow: 0 0 20px 5px #059669; /* Green glow for matched */
        }

        .card.fly-away {
            opacity: 0;
            /* Animate to the center of the screen */
            transform: translate(calc(50vw - 50% - var(--card-left)), calc(50vh - 50% - var(--card-top))) rotateY(180deg) scale(0.1) !important;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #ec4899, #d946ef);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #win-screen {
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        /* Flower/Heart Rain */
        .precipitation {
            position: fixed;
            font-size: 2rem; /* Made them a bit bigger */
            animation: fall 5s linear forwards;
            pointer-events: none;
            top: -10vh;
            z-index: 101; /* <-- Increased z-index to be ON TOP of the win screen */
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="main-content">
        <div id="game-container" class="text-center p-6">
            <h1 id="game-title" class="text-4xl text-pink-600 mb-2">Find the Matches!</h1>
            <p id="moves-counter" class="text-2xl text-pink-500 mb-4">Moves: 0</p>
            <div id="game-board">
                </div>
        </div>

        <div id="win-screen" class="hidden absolute inset-0 flex-col items-center justify-center text-center p-6">
            <h1 class="text-5xl text-green-600 mb-4">Gaammme Commmpleted!</h1> <p class="text-3xl text-gray-700 mb-6">You successfully found all the matches MY BAE!</p>
            <button id="restart-button" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg text-2xl">
                Play Again?
            </button>
        </div>
    </div>


    <audio id="correct-sound" src="correct.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const mainContent = document.getElementById('main-content');

            // --- Game Elements ---
            let gameBoard, movesCounter, winScreen, gameContainer, correctSound;
            let photoNames, cardImages;
            let hasFlippedCard, lockBoard, firstCard, secondCard;
            let moves, matchesFound, rainInterval;

            // --- Function to Initialize the Game ---
            function initializeGame() {
                gameBoard = document.getElementById('game-board');
                movesCounter = document.getElementById('moves-counter');
                winScreen = document.getElementById('win-screen');
                gameContainer = document.getElementById('game-container');
                correctSound = document.getElementById('correct-sound');

                // ------------------------------------------------------------------
                // IMPORTANT: Replace these with your 5 photo filenames
                // ------------------------------------------------------------------
                photoNames = [
                    "photo1.jpg",
                    "photo2.jpg",
                    "photo3.jpg",
                    "photo4.jpg",
                    "photo5.jpg"
                ];
                // ------------------------------------------------------------------

                cardImages = [...photoNames, ...photoNames, ...photoNames, ...photoNames];

                hasFlippedCard = false;
                lockBoard = false;
                firstCard = null;
                secondCard = null;
                moves = 0;
                matchesFound = 0;
                rainInterval = null;

                document.getElementById('restart-button').addEventListener('click', createBoard);

                // Initial board creation
                createBoard();
            }

            // --- Helper Functions (can be outside initializeGame) ---
             function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function createBoard() {
                // Reset game state
                gameBoard.innerHTML = '';
                winScreen.classList.add('hidden');
                winScreen.classList.remove('flex'); // Ensure flex is removed
                gameContainer.classList.remove('hidden');
                moves = 0;
                matchesFound = 0;
                movesCounter.textContent = 'Moves: 0';
                if (rainInterval) clearInterval(rainInterval);

                const shuffledCards = shuffle(cardImages);

                shuffledCards.forEach(imageName => {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.dataset.image = imageName;

                    card.innerHTML = `
                        <div class="card-face card-front">❓</div>
                        <div class="card-face card-back">
                            <img src="${imageName}" alt="Memory Photo" onerror="this.src='https://placehold.co/100x150/f472b6/ffffff?text=Photo'"/>
                        </div>
                    `;

                    card.addEventListener('click', flipCard);
                    gameBoard.appendChild(card);
                });
                resetBoard(); // Reset board variables
            }

            function flipCard() {
                if (lockBoard) return;
                if (this === firstCard) return; // Prevent double-clicking same card

                this.classList.add('is-flipped');

                if (!hasFlippedCard) {
                    hasFlippedCard = true;
                    firstCard = this;
                    return;
                }

                secondCard = this;
                // hasFlippedCard = false; // Reset happens in resetBoard
                updateMoves();
                checkForMatch();
            }

            function checkForMatch() {
                let isMatch = firstCard.dataset.image === secondCard.dataset.image;

                if (isMatch) {
                    disableCards();
                } else {
                    unflipCards();
                }
            }

            function disableCards() {
                correctSound.currentTime = 0; // Rewind sound
                correctSound.play().catch(e => console.log("Audio play prevented"));

                firstCard.removeEventListener('click', flipCard);
                secondCard.removeEventListener('click', flipCard);
                firstCard.classList.add('is-matched');
                secondCard.classList.add('is-matched');

                matchesFound++;

                if (matchesFound === 10) { // 10 pairs = 20 cards
                    setTimeout(winGame, 1000);
                } else {
                     resetBoard(); // Only reset board if game not won yet
                }
            }

            function unflipCards() {
                lockBoard = true;
                setTimeout(() => {
                    if(firstCard) firstCard.classList.remove('is-flipped');
                    if(secondCard) secondCard.classList.remove('is-flipped');
                    resetBoard();
                }, 1200);
            }

            function resetBoard() {
                [hasFlippedCard, lockBoard] = [false, false];
                [firstCard, secondCard] = [null, null];
            }

            function updateMoves() {
                moves++;
                movesCounter.textContent = `Moves: ${moves}`;
            }

            function winGame() {
                document.querySelectorAll('.card').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--card-left', `${rect.left}px`);
                    card.style.setProperty('--card-top', `${rect.top}px`);
                    card.classList.add('fly-away');
                });

                setTimeout(() => {
                    gameContainer.classList.add('hidden');
                    winScreen.classList.remove('hidden');
                    winScreen.classList.add('flex');
                    rainInterval = setInterval(createPrecipitation, 150);
                }, 1000);
            }

            function createPrecipitation() {
                const precipitation = document.createElement('div');
                const items = ['❤️', '🌸', '🌺', '🌼', '🌷'];
                precipitation.innerHTML = items[Math.floor(Math.random() * items.length)];
                precipitation.className = 'precipitation';

                precipitation.style.left = `${Math.random() * 100}vw`;
                precipitation.style.animationDuration = `${Math.random() * 2 + 3}s`;

                document.body.appendChild(precipitation);

                setTimeout(() => {
                    precipitation.remove();
                }, 5000);
            }

            // --- Start Game Immediately ---
            mainContent.classList.add('visible');
            initializeGame();

        }); // End of DOMContentLoaded
    </script>
</body>
</html>
